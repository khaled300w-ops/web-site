<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خالد اللعيب | مبرمج الأندرويد الذكي</title>
    <style>
        :root {
            --primary: #f39c12; /* لون برتقالي عصري */
            --bg: #f9f9f9;
            --code-bg: #282c34;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.05);
        }

        /* سطر الإدخال والزر */
        .search-box {
            display: flex;
            gap: 10px;
            margin: 25px 0;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--primary); }

        .btn-run {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-run:hover { opacity: 0.9; transform: scale(1.02); }

        /* منطقة الكود */
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #21252b;
            padding: 10px 20px;
            border-radius: 8px 8px 0 0;
            color: #abb2bf;
            font-size: 14px;
            margin-top: 20px;
        }

        .copy-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        pre {
            margin-top: 0;
            background: var(--code-bg);
            color: #61afef;
            padding: 20px;
            border-radius: 0 0 8px 8px;
            text-align: left;
            direction: ltr;
            overflow-x: auto;
            font-family: 'Consolas', monospace;
            line-height: 1.5;
            min-height: 150px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📱 بناء تطبيقات الأندرويد (JS Open Source)</h2>
    <p>اكتب وصف وظيفة التطبيق، وسنقوم بتوليد كود JavaScript للأوامر فوراً:</p>

    <div class="search-box">
        <input type="text" id="userDesc" placeholder="مثلاً: تطبيق يغير لون الخلفية عند الضغط على زر...">
        <button class="btn-run" onclick="generateJS()">ابدأ البرمجة</button>
    </div>

    <div id="outputArea" class="hidden">
        <div class="code-header">
            <span>index.js (Android Logic)</span>
            <button class="copy-btn" onclick="copyCode()">نسخ الكود</button>
        </div>
        <pre id="codeResult"></pre>
    </div>
</div>

<script>
    function generateJS() {
        const desc = document.getElementById('userDesc').value;
        if(!desc) return alert("اكتب الوصف أولاً يا بطل!");

        const output = document.getElementById('outputArea');
        const codeBox = document.getElementById('codeResult');
        
        output.classList.remove('hidden');
        codeBox.innerText = "// جاري التفكير في المنطق البرمجي...";

        setTimeout(() => {
            // كود JavaScript مفتوح المصدر يحاكي بناء تطبيق
            const jsCode = `
/* Generated by Khalid Al-Laeib System
   Target: Android Web-App (Open Source)
   Feature: ${desc}
*/

// انتظار تحميل التطبيق
document.addEventListener("deviceready", onDeviceReady, false);

function onDeviceReady() {
    console.log("تطبيق الأندرويد جاهز للعمل!");
    
    // الأوامر البرمجية بناءً على طلبك:
    // الوصف: ${desc}
    
    const appCore = {
        init: function() {
            console.log("تشغيل منطق JavaScript...");
            this.handleLogic();
        },
        handleLogic: function() {
            // هنا يتم تنفيذ: ${desc}
            alert("تم تفعيل ميزة: ${desc}");
        }
    };

    appCore.init();
}
            `.trim();
            codeBox.innerText = jsCode;
        }, 800);
    }

    function copyCode() {
        const code = document.getElementById('codeResult').innerText;
        navigator.clipboard.writeText(code);
        alert("تم نسخ الكود للمحفظة!");
    }
</script>

</body>
</html>
