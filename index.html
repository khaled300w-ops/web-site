<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع اللعيب</title>
    <style>
        /* CSS - التصميم العصري */
        :root {
            --main-color: #2c3e50; /* لون احترافي غامق */
            --accent-color: #3498db; /* أزرق عصري */
            --text-color: #333;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { color: var(--main-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; }
        h3 { color: var(--accent-color); }
        h4 { color: #555; font-style: italic; }
        
        /* تصميم الأزرار */
        .btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: white;
            padding: 12px 25px;
            margin: 10px;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s ease;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: var(--main-color);
            transform: translateY(-2px);
        }

        /* تذييل الصفحة (Footer) */
        footer {
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid #ddd;
            font-size: 0.9em;
            color: #777;
        }

        .contact-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        /* مساحة مخصصة لإعلانات أدسنس مستقبلاً */
        .ad-space {
            margin: 20px 0;
            padding: 10px;
            background: #eee;
            border: 1px dashed #bbb;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>خالد اللعيب</h1>
    <h3>بناء التطبيقات</h3>
    
    <div class="ad-space">مساحة إعلانية (AdSense Slot)</div>

    <a href="bulid.html" class="btn">المتصفح الجوال</a>
    
    <h4>عندما تصنع تطبيقك وتكون متميزاً</h4>

    <h3>أحدث المقالات</h3>
    <a href="text.html" class="btn">اضغط هنا لأحدث المقالات</a>

    <div class="contact-links">
        <h6>اتصل بنا</h6>
        <h6>تواصل معنا</h6>
    </div>

    <footer>
        <p>جميع الحقوق الفكرية محفوظة © 2026</p>
    </footer>
</div>

</body>
</html>
